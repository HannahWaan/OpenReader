name: open_reader
description: A powerful book reader with OCR, Chaimager, cloud sync & smart dictionary.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # ─── CORE UI ───
  cupertino_icons: ^1.0.8
  flex_color_scheme: ^8.1.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # ─── STATE MANAGEMENT ───
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # ─── NAVIGATION ───
  go_router: ^14.8.1

  # ─── READER ENGINES ───
  epubx: ^4.0.0                          # EPUB parser
  flutter_html: ^3.0.0-beta.2            # Render EPUB HTML
  pdfrx: ^1.0.97                         # PDF viewer (free, fast)

  # ─── OCR (FREE, ON-DEVICE) ───
  google_mlkit_text_recognition: ^0.15.1  # Mới nhất, Dart 3.8
  camera: ^0.11.1
  image: ^4.5.3
  image_cropper: ^8.0.2
  image_picker: ^1.1.2

  # ─── LOCAL DATABASE ───
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.1

  # ─── CLOUD SYNC (SUPABASE FREE) ───
  supabase_flutter: ^2.10.3
  connectivity_plus: ^6.1.4

  # ─── FILE HANDLING ───
  file_picker: ^8.1.7
  share_plus: ^10.1.4
  archive: ^4.0.2                        # Unzip EPUB
  permission_handler: ^11.3.1

  # ─── READING EXPERIENCE ───
  wakelock_plus: ^1.2.10
  flutter_local_notifications: ^18.0.1
  shared_preferences: ^2.5.3

  # ─── UTILS ───
  uuid: ^4.5.1
  intl: ^0.20.2
  collection: ^1.19.1
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.15
  custom_lint: ^0.7.5

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/dictionaries/

  fonts:
    - family: Merriweather
      fonts:
        - asset: assets/fonts/Merriweather-Regular.ttf
        - asset: assets/fonts/Merriweather-Bold.ttf
          weight: 700
        - asset: assets/fonts/Merriweather-Italic.ttf
          style: italic
    - family: NotoSerif
      fonts:
        - asset: assets/fonts/NotoSerif-Regular.ttf
        - asset: assets/fonts/NotoSerif-Bold.ttf
          weight: 700
