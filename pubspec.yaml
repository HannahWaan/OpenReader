name: open_reader
description: A powerful book reader with OCR, Chaimager, cloud sync & smart dictionary.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # State & Navigation
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1

  # Reader
  pdfrx: ^1.0.97

  # Local DB
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.1

  # File handling
  file_picker: ^8.1.7
  permission_handler: ^11.3.1

  # Reading experience
  wakelock_plus: ^1.2.10
  shared_preferences: ^2.5.3

  # Utils
  uuid: ^4.5.1
  intl: ^0.20.2
  equatable: ^2.0.7

  # Phase 2 (them sau):
  # supabase_flutter: ^2.10.3
  # connectivity_plus: ^6.1.4
  # google_mlkit_text_recognition: ^0.15.1
  # camera: ^0.11.1
  # image_picker: ^1.1.2
  # epubx: ^4.0.0
  # share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/dictionaries/
